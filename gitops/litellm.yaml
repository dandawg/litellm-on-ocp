apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: rhoai-demos
    app.kubernetes.io/component: application
spec:
  project: default
  source:
    repoURL: https://github.com/dandawg/litellm-on-ocp.git
    targetRevision: main
    path: helm
    helm:
      valueFiles:
        - values.yaml
        # Uncomment and set the path to your override file to layer in models/secrets:
        # - values-myenv.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  ignoreDifferences: []
