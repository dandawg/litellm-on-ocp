apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: {{ .Values.namespace }}
  labels:
    app: litellm
  annotations:
    argocd.argoproj.io/sync-wave: "42"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      serviceAccountName: litellm
      containers:
        - name: litellm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default "litellm-secret" .Values.auth.existingSecret }}
                  key: LITELLM_MASTER_KEY
            - name: UI_USERNAME
              value: "admin"
            - name: UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default "litellm-secret" .Values.auth.existingSecret }}
                  key: LITELLM_MASTER_KEY
{{- if .Values.postgres.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default "litellm-secret" .Values.auth.existingSecret }}
                  key: POSTGRES_PASSWORD
            # DATABASE_URL is composed at pod startup using $(POSTGRES_PASSWORD) substitution.
            # POSTGRES_PASSWORD must appear before this entry in the env list.
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@litellm-postgres:5432/{{ .Values.postgres.database }}"
{{- end }}
{{- if .Values.envFrom }}
          envFrom:
{{- toYaml .Values.envFrom | nindent 12 }}
{{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
{{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: litellm-config
