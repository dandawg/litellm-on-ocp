{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secret
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "40"
type: Opaque
stringData:
  LITELLM_MASTER_KEY: {{ .Values.auth.masterKey | quote }}
{{- if .Values.postgres.enabled }}
  DATABASE_URL: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@litellm-postgres:5432/{{ .Values.postgres.database }}"
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
{{- end }}
{{- end }}
