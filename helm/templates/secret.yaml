{{- if or (not .Values.auth.existingSecret) .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secret
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "40"
type: Opaque
stringData:
{{- if not .Values.auth.existingSecret }}
  LITELLM_MASTER_KEY: {{ .Values.auth.masterKey | quote }}
{{- end }}
{{- if .Values.postgres.enabled }}
{{- if not .Values.auth.existingSecret }}
  # When existingSecret is set, POSTGRES_PASSWORD and DATABASE_URL come from that
  # secret instead; only non-sensitive Postgres config is stored here.
  DATABASE_URL: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@litellm-postgres:5432/{{ .Values.postgres.database }}"
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
{{- end }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
{{- end }}
{{- end }}
