# Default values for LiteLLM on OpenShift
namespace: demo-apps

image:
  repository: ghcr.io/berriai/litellm
  tag: v1.82.0-stable.patch5  # main-latest
  pullPolicy: IfNotPresent

replicas: 1

service:
  type: ClusterIP
  port: 4000

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "2Gi"

# LiteLLM master key configuration.
# Recommended: pre-create a Kubernetes Secret with LITELLM_MASTER_KEY (and
#   POSTGRES_PASSWORD when postgres.enabled is true), then set auth.existingSecret
#   to its name. The deployment pod fails to start if the secret does not exist —
#   a deliberate pre-flight gate against deploying with an unconfigured key.
# Alternative (local dev only): provide masterKey directly. The chart creates litellm-secret
#   from this value. Do not use a guessable value in any environment reachable from a network.
#
# The chart never creates a consumer Secret — populate litellm-consumer separately
# (e.g. via a PostSync Job) so downstream consumers receive a scoped virtual key,
# not the master key.
auth:
  masterKey: "sk-changeme"
  # Name of a pre-existing Secret that holds LITELLM_MASTER_KEY.
  # When postgres.enabled is true this secret must also contain POSTGRES_PASSWORD.
  # When set, litellm-secret is not created and the deployment reads from this secret directly.
  existingSecret: ""

# Bundled Postgres for LiteLLM spend tracking and key management.
# LiteLLM's bundled Prisma schema requires PostgreSQL — SQLite is not supported.
# postgres.enabled: false disables the bundled Postgres deployment; you must supply your own
# DATABASE_URL via auth.existingSecret or another mechanism, or accept that the admin UI,
# virtual key management, and spend tracking will not function.
# Set postgres.enabled: true (recommended) to deploy a bundled PostgreSQL instance.
postgres:
  enabled: false
  image:
    repository: postgres
    tag: "15"
  storage: 5Gi
  storageClassName: ""  # leave empty to use cluster default
  database: litellm
  user: litellm
  # password is used only when auth.existingSecret is NOT set.
  # When auth.existingSecret is set, POSTGRES_PASSWORD must be present in that secret.
  password: "changeme"

# Additional environment variables injected via envFrom (e.g. model API key secrets).
# Each entry is a Kubernetes envFromSource (secretRef or configMapRef).
# Example:
#   envFrom:
#     - secretRef:
#         name: model-api-tokens
envFrom: []

# LiteLLM proxy configuration.
# The content of litellm.config is rendered as /app/config.yaml inside the pod.
# Override this in a values overlay to add models, routing rules, etc.
litellm:
  config: |
    model_list: []
    # Add models here or in a values overlay file, for example:
    #
    # model_list:
    #   - model_name: my-model
    #     litellm_params:
    #       model: openai/my-model
    #       api_base: http://my-inference-service/v1
    #       api_key: "none"
    #
    litellm_settings:
      # Disable TLS verification for internal cluster services (e.g. RHOAI InferenceServices)
      # that present self-signed certificates. Without this, LiteLLM raises:
      #   ssl.SSLCertVerificationError: certificate verify failed: self-signed certificate in chain
      ssl_verify: false
    general_settings:
      store_model_in_db: true
